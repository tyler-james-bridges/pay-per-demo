name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://pay-per-demo.vercel.app
      EVM_PAYEE_ADDRESS: ${{ secrets.EVM_PAYEE_ADDRESS }}
      CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
      CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
      DEMO_PRICE_USDC: "0.01"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        if: env.CDP_API_KEY_ID != ''
